databases:
  - name: jarvis-att-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: jarvis-att
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: jarvis-att-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: jarvis-att-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: jarvis-att-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: jarvis-att-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: jarvis-att-db
          property: password
      - key: JARVIS_HMAC_SECRET
        generateValue: true
      - key: JARVIS_AES_KEY
        generateValue: true
      - key: JARVIS_JWT_SECRET
        generateValue: true
