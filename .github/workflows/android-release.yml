name: Build and release Android APK

on:
  push:
    tags:
      - "v*-android"
  workflow_dispatch:

env:
  # Public backend the app talks to. Update this if the Render service URL changes.
  API_BASE_URL: https://jarvis-att.onrender.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build web assets for mobile
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ env.API_BASE_URL }}
        run: npx vite build

      - name: Sync Capacitor Android project
        working-directory: frontend
        run: npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp frontend/android/app/build/outputs/apk/debug/app-debug.apk jarvis-att.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: JARVIS-ATT Android ${{ github.ref_name }}
          body: |
            Debug-signed Android build of JARVIS-ATT.
            Backend: ${{ env.API_BASE_URL }}

            Install: enable "install from unknown sources" for your browser/file
            manager, download jarvis-att.apk below, then open it.
          files: jarvis-att.apk
